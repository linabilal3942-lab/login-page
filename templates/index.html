<div class="container">
<form id="registerForm">

    <h2>Register</h2>

    <input
        type="text"
        id="registerUsername"
        placeholder="Username"
        required
    >

    <input
        type="password"
        id="registerPassword"
        placeholder="Password"
        required
    >

    <button type="submit">
        Create Account
    </button>

</form>
</div>
